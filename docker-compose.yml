services:
  postgres:
    image: postgres:16-alpine
    container_name: stockpred-postgres
    environment:
      POSTGRES_USER: stockpred
      POSTGRES_PASSWORD: stockpred
      POSTGRES_DB: stockpred
    ports:
      - "5432:5432"
    volumes:
      - stockpred-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpred -d stockpred"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stockpred-pgdata:
